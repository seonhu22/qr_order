spring.application.name=qrorder

# 로컬 환경별 민감 설정은 application-local.properties 에서 관리 (gitignore됨)
spring.config.import=optional:classpath:application-local.properties

# MyBatis Configuration
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=htms.QROrder.**.domain

# Session Configuration (URL에 세션ID 노출 방지)
server.servlet.session.tracking-modes=cookie
server.servlet.session.timeout=1h

# Static Resource Cache (개발 환경)
spring.web.resources.cache.period=0

# MyBatis Query Log
logging.level.htms.QROrder.auth.repository=DEBUG
logging.level.htms.QROrder.system.repository=DEBUG
logging.level.htms.QROrder.common.repository=DEBUG
logging.level.htms.QROrder.popup.repository=DEBUG
logging.level.htms.QROrder.log.repository=DEBUG
